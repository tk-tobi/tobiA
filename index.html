<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tobi Adeyefa | terminal</title>

  <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/jquery.terminal.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.terminal/css/jquery.terminal.min.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1e2030;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      padding: 40px 20px;
    }

    #terminal-window {
      width: 100%;
      max-width: 860px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }

    #title-bar {
      background-color: #2a2d3e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1a1c2a;
    }

    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot-red    { background-color: #ff5f57; }
    .dot-yellow { background-color: #febc2e; }
    .dot-green  { background-color: #28c840; }

    #terminal-body {
      background-color: #282a36;
      padding: 0;
      min-height: 420px;
    }

    .terminal {
      background: #282a36 !important;
      font-family: 'JetBrains Mono', 'Courier New', monospace !important;
      font-size: 14px !important;
      line-height: 1.7 !important;
      padding: 24px 28px !important;
      min-height: 420px !important;
      --color: #cdd6f4;
      --background: #282a36;
    }

    .terminal .terminal-output div div { white-space: pre-wrap; }
    .terminal-prompt-main .terminal-prompt { color: #89b4fa !important; }

    .cmd-cursor {
      background-color: #cdd6f4 !important;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #footer {
      margin-top: 28px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #565f89;
      line-height: 2;
    }

    #footer a {
      color: #89b4fa;
      text-decoration: none;
      font-weight: 700;
    }

    #footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <div id="terminal-window">
    <div id="title-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
    </div>
    <div id="terminal-body"></div>
  </div>

  <div id="footer">
    <div>© Tobi Adeyefa 2026</div>
    <div>Made with ♥ and coffee</div>
  </div>

  <script>
    // ── Color helpers ────────────────────────────────────────
    const c = {
      green:  (t) => `[[;#a6e3a1;]${t}]`,
      blue:   (t) => `[[;#89b4fa;]${t}]`,
      purple: (t) => `[[;#cba6f7;]${t}]`,
      yellow: (t) => `[[;#f9e2af;]${t}]`,
      dim:    (t) => `[[;#565f89;]${t}]`,
      white:  (t) => `[[;#cdd6f4;]${t}]`,
      bold:   (t) => `[[b;#cdd6f4;]${t}]`,
    };

    // ── Virtual filesystem ───────────────────────────────────
    const fs = {

      '~': {
        type: 'dir',
        children: ['about.txt', 'projects/', 'contact/']
      },

      '~/about.txt': {
        type: 'file',
        content: [
          'Name     : Tobi Adeyefa',
          'Bio      : Data Lover',
          'Location : NYC, East Coast USA',
        ].join('\n')
      },

      // ── projects/ ─────────────────────────────────────────
      '~/projects': {
        type: 'dir',
        children: [
          'jobapps-copilot.txt',
          'dbt-gen.txt',
          'quick-utils.txt',
        ]
      },

      '~/projects/jobapps-copilot.txt': {
        type: 'file',
        content: [
          'JobApps Copilot',
          '───────────────────────────────────────────',
          'Track and monitor jobs you find interesting.',
          'Self-hosted with a clean web interface — completely extensible.',
          '',
          'Stack    : Python · Flask · SQLite · Docker',
          'Features : ·Job pipeline board (Kanban-style)',
          '           ·Auto-enriches listings via web scraping',
          '           ·Email digest of new matches',
          '           ·Export to CSV / Notion',
          '',
          'GitHub   : https://github.com/tk-tobi/jobapps-copilot',
        ].join('\n')
      },

      '~/projects/dbt-gen.txt': {
        type: 'file',
        content: [
          'dbt-gen',
          '───────────────────────────────────────────',
          'Groq-powered CLI that converts raw SQL into production-ready',
          'dbt models, schema.yml, and column-level tests in one shot.',
          '',
          'Stack    : Python · Groq API · Llama 3.3 70B',
          'Features : ·Decomposes raw SQL into CTE-based dbt models',
          '           ·Auto-generates schema.yml with column descriptions',
          '           ·Infers not_null, unique, accepted_values tests',
          '           ·Drops files directly into /models directory',
          '           ·Stdin or file input — works in any shell',
          '',
          'GitHub   : https://github.com/tk-tobi/dbt-gen',
        ].join('\n')
      },

      '~/projects/quick-utils.txt': {
        type: 'file',
        content: [
          'Quick Utils',
          '───────────────────────────────────────────',
          'iOS app for spinning up and tearing down AI-powered utilities',
          'in seconds. Minimal UI, maximum utility.',
          '',
          'Stack    : Swift · SwiftUI · OpenAI API',
          'Simple   : ·Currency Calculator',
          '           ·Unit Converter',
          '           ·Portfolio Snapshot',
          'Complex  : ·Portfolio Tracker (live prices + P&L)',
          '           ·Wager Tracker for Gaming & Prediction Platforms',
          '',
          'Status   : In development — TestFlight beta coming soon',
        ].join('\n')
      },

      // ── contact/ ──────────────────────────────────────────
      '~/contact': {
        type: 'dir',
        children: ['github.txt', 'linkedin.txt']
      },

      '~/contact/github.txt': {
        type: 'file',
        content: 'https://github.com/tk-tobi',
        url: 'https://github.com/tk-tobi',
      },

      '~/contact/linkedin.txt': {
        type: 'file',
        content: 'https://linkedin.com/in/oadeyefa/',
        url: 'https://linkedin.com/in/oadeyefa/',
      },

    };

    // ── State ────────────────────────────────────────────────
    let cwd = '~';

    function resolvePath(target) {
      if (!target || target === '~') return '~';
      if (target === '..') {
        const parts = cwd.split('/');
        parts.pop();
        return parts.join('/') || '~';
      }
      if (target.startsWith('~/')) return target;
      return cwd === '~' ? `~/${target}` : `${cwd}/${target}`;
    }

    // ── Commands ─────────────────────────────────────────────
    const COMMANDS = {

      help: function () {
        this.echo([
          `- ${c.green('path')} — display current directory`,
          `- ${c.green('cat')} ${c.purple('FILENAME')} — display file contents`,
          `- ${c.green('cd')} ${c.purple('DIRECTORY')} — move into directory ${c.dim('(cd to return to root)')}`,
          `- ${c.green('ls')} — show files in current directory`,
          `- ${c.green('link')} ${c.purple('FILENAME')} — open a contact link ${c.dim('(e.g. link github.txt)')}`,
          `- ${c.green('whoami')} — who am i?`,
          `- ${c.green('history')} — see your command history`,
          `- ${c.green('clear')} — clear the terminal`,
        ].join('\n'));
      },

      path: function () {
        this.echo(c.white(cwd));
      },

      ls: function () {
        const node = fs[cwd];
        if (!node || node.type !== 'dir') {
          this.error('Not a directory.');
          return;
        }
        const output = node.children.map(name => {
          const isDir = name.endsWith('/');
          return isDir ? c.blue(name) : c.white(name);
        });
        this.echo(output.join('  '));
      },

      cd: function (target) {
        if (!target || target === '~') { cwd = '~'; return; }
        const resolved = resolvePath(target.replace(/\/$/, ''));
        if (fs[resolved] && fs[resolved].type === 'dir') {
          cwd = resolved;
        } else {
          this.error(`cd: no such directory: ${target}`);
        }
      },

      cat: function (filename) {
        if (!filename) { this.error('Usage: cat FILENAME'); return; }
        const resolved = resolvePath(filename);
        const node = fs[resolved];
        if (!node)              { this.error(`cat: ${filename}: No such file`); return; }
        if (node.type === 'dir') { this.error(`cat: ${filename}: Is a directory`); return; }
        this.echo(c.white(node.content));
      },

      // ── link: open a contact file's URL in a new tab ──────
      link: function (filename) {
        if (!filename) {
          this.error(`Usage: link FILENAME  ${c.dim('(e.g. link github.txt)')}`);
          return;
        }

        // Allow bare names like "github" or full names like "github.txt"
        const normalized = filename.endsWith('.txt') ? filename : `${filename}.txt`;
        const resolved   = resolvePath(normalized);
        const node       = fs[resolved];

        if (!node) {
          this.error(`link: ${filename}: No such file`);
          return;
        }
        if (node.type === 'dir') {
          this.error(`link: ${filename}: Is a directory — cd into it first and use ls`);
          return;
        }

        // Use dedicated url field if present, otherwise treat content as URL
        const url = node.url || node.content.trim();

        if (!url.startsWith('http')) {
          this.error(`link: ${filename}: No URL found in this file`);
          return;
        }

        this.echo(`Opening ${c.blue(normalized)} → ${c.dim(url)}`);
        window.open(url, '_blank');
      },

      whoami: function () {
        this.echo(`${c.yellow('tk-tobi')} — data engineer, builder`);
      },

    };

    // ── Greetings ─────────────────────────────────────────────
    // Backslash before [ prevents jQuery Terminal from parsing
    // the bracket as a color/formatting token.
    const GREETINGS = [
      `${c.white('\\[*_*]/ Welcome to Tobi\'s terminal')}`,
      `type ${c.green('help')} to get started`,
    ].join('\n');

    // ── Mount ─────────────────────────────────────────────────
    $('#terminal-body').terminal(COMMANDS, {
      greetings: GREETINGS,
      name: 'portfolio',
      prompt: `${c.blue('root')} ${c.dim('›')} `,
      completion: Object.keys(COMMANDS),
      checkArity: false,
      historySize: 50,
      onUnknownCommand: function (cmd) {
        this.error(`command not found: ${cmd}. Type help for options.`);
      }
    });
  </script>

</body>
</html>
