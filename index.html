<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>your-username | terminal</title>

  <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/jquery.terminal.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.terminal/css/jquery.terminal.min.css"/>

  <style>
    /* ── Google Font (matches the screenshot's monospace) ── */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Page background: dark navy ────────────────────────── */
    body {
      background-color: #1e2030;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      padding: 40px 20px;
    }

    /* ── macOS window card ──────────────────────────────────── */
    #terminal-window {
      width: 100%;
      max-width: 860px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    }

    /* ── Title bar ──────────────────────────────────────────── */
    #title-bar {
      background-color: #2a2d3e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1a1c2a;
    }

    /* Traffic light dots */
    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }
    .dot-red    { background-color: #ff5f57; }
    .dot-yellow { background-color: #febc2e; }
    .dot-green  { background-color: #28c840; }

    /* ── Terminal body ──────────────────────────────────────── */
    #terminal-body {
      background-color: #282a36;
      padding: 0;
      min-height: 420px;
    }

    /* ── jQuery Terminal overrides ──────────────────────────── */
    .terminal {
      background: #282a36 !important;
      font-family: 'JetBrains Mono', 'Courier New', monospace !important;
      font-size: 14px !important;
      line-height: 1.7 !important;
      padding: 24px 28px !important;
      min-height: 420px !important;

      /* No glow — clean dark IDE look like the screenshot */
      --color: #cdd6f4;
      --background: #282a36;
    }

    /* Hide the default greetings border/line if any */
    .terminal .terminal-output div div {
      white-space: pre-wrap;
    }

    /* Prompt: "root >" in muted green */
    .terminal-prompt-main .terminal-prompt {
      color: #89b4fa !important;
    }

    /* Cursor */
    .cmd-cursor {
      background-color: #cdd6f4 !important;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Footer ─────────────────────────────────────────────── */
    #footer {
      margin-top: 28px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #565f89;
      line-height: 2;
    }

    #footer a {
      color: #89b4fa;
      text-decoration: none;
      font-weight: 700;
    }

    #footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- ── macOS-style window ───────────────────────────────── -->
  <div id="terminal-window">

    <!-- Title bar with traffic lights -->
    <div id="title-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-green"></span>
    </div>

    <!-- Terminal mounts here -->
    <div id="terminal-body"></div>

  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <div id="footer">
    <div>© Tobi Adeyefa 2026</div>
    <div>Made with ♥ and coffee — </div>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────
    // Color helper: wraps text in jQuery Terminal's color syntax
    // [[fg;bg;class]text]
    // ─────────────────────────────────────────────────────────
    const c = {
      green:  (t) => `[[;#a6e3a1;]${t}]`,   // command names (ls, cd, cat…)
      blue:   (t) => `[[;#89b4fa;]${t}]`,   // prompt "root", args like LINK
      purple: (t) => `[[;#cba6f7;]${t}]`,   // special args like FILENAME, DIRECTORY
      yellow: (t) => `[[;#f9e2af;]${t}]`,   // accent / whoami name
      dim:    (t) => `[[;#565f89;]${t}]`,   // muted text
      white:  (t) => `[[;#cdd6f4;]${t}]`,   // normal output
      bold:   (t) => `[[b;#cdd6f4;]${t}]`,  // bold white
    };

    // ─────────────────────────────────────────────────────────
    // Virtual filesystem
    // ─────────────────────────────────────────────────────────
    const fs = {
      '~': {
        type: 'dir',
        children: ['about.txt', 'projects/', 'contact/']
      },
      '~/about.txt': {
        type: 'file',
        content: [
          'Name     : Your Name',
          'Role     : Technical Lead | Data Engineering',
          'Location : New York City',
          'Status   : Open to opportunities',
        ].join('\n')
      },
      '~/projects': {
        type: 'dir',
        children: ['alpha.txt', 'beta.txt', 'gamma.txt']
      },
      '~/projects/alpha.txt': {
        type: 'file',
        content: 'Project Alpha\nAWS/Python data pipeline — 10M+ events/day\nStack: Lambda · Glue · Redshift · S3'
      },
      '~/projects/beta.txt': {
        type: 'file',
        content: 'Project Beta\nIoT Advertising Stack — real-time bidding engine\nStack: Kafka · Spark · PostgreSQL · Docker'
      },
      '~/projects/gamma.txt': {
        type: 'file',
        content: 'Project Gamma\nInternal BI dashboard — reduced report time 70%\nStack: dbt · Airflow · Metabase'
      },
      '~/contact': {
        type: 'dir',
        children: ['github.txt', 'linkedin.txt', 'bluesky.txt']
      },
      '~/contact/github.txt': {
        type: 'file',
        content: 'https://github.com/your-username'
      },
      '~/contact/linkedin.txt': {
        type: 'file',
        content: 'https://linkedin.com/in/your-profile'
      },
      '~/contact/bluesky.txt': {
        type: 'file',
        content: 'https://bsky.app/profile/yourhandle'
      },
    };

    // ─────────────────────────────────────────────────────────
    // State
    // ─────────────────────────────────────────────────────────
    let cwd = '~';   // current working directory

    function resolvePath(target) {
      if (!target || target === '~') return '~';
      if (target === '..') {
        const parts = cwd.split('/');
        parts.pop();
        return parts.join('/') || '~';
      }
      if (target.startsWith('~/')) return target;
      return cwd === '~' ? `~/${target}` : `${cwd}/${target}`;
    }

    // ─────────────────────────────────────────────────────────
    // Commands
    // ─────────────────────────────────────────────────────────
    const COMMANDS = {

      help: function () {
        this.echo([
          `- ${c.green('path')} — display current directory`,
          `- ${c.green('cat')} ${c.purple('FILENAME')} — display file contents`,
          `- ${c.green('cd')} ${c.purple('DIRECTORY')} — move into directory ${c.dim('(cd to return to root)')}`,
          `- ${c.green('ls')} — show files in current directory`,
          `- ${c.green('open')} ${c.purple('LINK')} — open a contact link ${c.dim('(github, bluesky, linkedin)')}`,
          `- ${c.green('whoami')} — who am i?`,
          `- ${c.green('history')} — see your command history`,
          `- ${c.green('clear')} — clear the terminal`,
        ].join('\n'));
      },

      path: function () {
        this.echo(c.white(cwd));
      },

      ls: function () {
        const node = fs[cwd];
        if (!node || node.type !== 'dir') {
          this.error('Not a directory.');
          return;
        }
        const output = node.children.map(name => {
          const fullPath = cwd === '~' ? `~/${name.replace('/', '')}` : `${cwd}/${name.replace('/', '')}`;
          const isDir = name.endsWith('/');
          return isDir ? c.blue(name) : c.white(name);
        });
        this.echo(output.join('  '));
      },

      cd: function (target) {
        if (!target || target === '~') {
          cwd = '~';
          return;
        }
        const resolved = resolvePath(target.replace(/\/$/, ''));
        if (fs[resolved] && fs[resolved].type === 'dir') {
          cwd = resolved;
        } else {
          this.error(`cd: no such directory: ${target}`);
        }
      },

      cat: function (filename) {
        if (!filename) { this.error('Usage: cat FILENAME'); return; }
        const resolved = resolvePath(filename);
        const node = fs[resolved];
        if (!node) { this.error(`cat: ${filename}: No such file`); return; }
        if (node.type === 'dir') { this.error(`cat: ${filename}: Is a directory`); return; }
        this.echo(c.white(node.content));
      },

      open: function (link) {
        const links = {
          github:   'https://github.com/your-username',
          linkedin: 'https://linkedin.com/in/your-profile',
          bluesky:  'https://bsky.app/profile/yourhandle',
          resume:   'https://your-cdn.com/resume.pdf',
        };
        if (!link) { this.error('Usage: open LINK  (github | linkedin | bluesky | resume)'); return; }
        const url = links[link.toLowerCase()];
        if (!url) { this.error(`open: unknown link "${link}". Try: github, linkedin, bluesky, resume`); return; }
        this.echo(`Opening ${c.blue(link)}...`);
        window.open(url, '_blank');
      },

      whoami: function () {
        this.echo(`${c.yellow('your-username')} — technical lead, data engineer`);
      },

    };

    // ─────────────────────────────────────────────────────────
    // Boot / greetings (matches screenshot style)
    // ─────────────────────────────────────────────────────────
    const GREETINGS = [
      `${c.white('\\[._.]/  welcome to your-username.github.io')}`,
      `type ${c.green('help')} to get started`,
    ].join('\n');

    // ─────────────────────────────────────────────────────────
    // Mount
    // ─────────────────────────────────────────────────────────
    $('#terminal-body').terminal(COMMANDS, {
      greetings: GREETINGS,
      name: 'portfolio',

      // Prompt matches screenshot: "root > "
      prompt: `${c.blue('root')} ${c.dim('›')} `,

      completion: Object.keys(COMMANDS),
      checkArity: false,
      historySize: 50,

      onUnknownCommand: function (cmd) {
        this.error(`command not found: ${cmd}. Type help for options.`);
      }
    });
  </script>

</body>
</html>
